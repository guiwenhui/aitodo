# ============================================================================
# AI Todo + 拖延症治疗器 - 应用配置
# ============================================================================

# Server port
server.port=8080

# ============================================================================
# 数据库配置 (MySQL - 生产环境)
# ============================================================================

# MySQL 数据库配置
# 1. 安装 MySQL 并创建数据库 (参考 MYSQL_SETUP_GUIDE.md)
# 2. 替换下面的用户名和密码
# 3. 确保 MySQL 服务正在运行

spring.datasource.url=jdbc:mysql://localhost:3306/aitodo?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=aitodo_user
spring.datasource.password=123456

# 可选：使用环境变量设置密码（更安全）
# spring.datasource.username=${DB_USERNAME:root}
# spring.datasource.password=${DB_PASSWORD:}

# ============================================================================
# H2 内存数据库 (开发环境 - 已注释)
# ============================================================================

# 快速切换到 H2 内存数据库：
# 1. 注释上面的 MySQL 配置 (在第 16-19 行前添加 #)
# 2. 取消注释下面的 H2 配置 (移除第 23-26 行前的 #)
# 3. 将第 38 行改为: spring.sql.init.schema-locations=classpath:schema.sql

# spring.datasource.url=jdbc:h2:mem:aitodo;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_UPPER=false
# spring.datasource.driver-class-name=org.h2.Driver
# spring.datasource.username=sa
# spring.datasource.password=

# H2 控制台 (调试用，访问 http://localhost:8080/h2-console)
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console

# ============================================================================
# MyBatis 配置
# ============================================================================

mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# ============================================================================
# HikariCP 连接池配置
# ============================================================================

spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-test-query=SELECT 1

# ============================================================================
# JPA 配置 (可选)
# ============================================================================

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false

# ============================================================================
# 数据库初始化
# ============================================================================

# 应用启动时自动执行 schema-mysql.sql 创建表结构
# 如果表已存在，请改为 never 或 comment
spring.sql.init.mode=never
# spring.sql.init.schema-locations=classpath:schema-mysql.sql

# ============================================================================
# 日志配置 (可选)
# ============================================================================

# 查看 SQL 日志
logging.level.com.example.aitodo.mapper=DEBUG
logging.level.org.springframework.jdbc=DEBUG
logging.level.com.zaxxer.hikari=DEBUG