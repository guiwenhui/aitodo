<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>健康检查 - AI Todo + 拖延症治疗器</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" th:href="@{/css/style.css}">

    <style>
        /* 移除与全局冲突的 body、nav 等样式，只保留健康页面特有的状态样式 */

        /* 补充健康页面专用的红绿灯颜色变量 */
        :root {
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        /* 主内容容器：🌟 修复被导航栏遮挡的问题，上边距统一改为 100px */
        .health-container {
            max-width: 800px;
            margin: 100px auto 40px; /* 关键修改！留出导航栏的呼吸空间 */
            padding: 0 20px;
            width: 100%;
        }

        .health-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .health-title {
            font-size: 2.5rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 1rem;
            color: var(--text);
            /* 使用全局变量生成渐变色，保证色彩统一 */
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .health-subtitle {
            font-size: 1.1rem;
            color: var(--text-light);
            max-width: 600px;
            margin: 0 auto;
        }

        /* 状态卡片 */
        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .status-card {
            background: var(--bg-light);
            border-radius: var(--radius);
            padding: 2rem;
            border: 1px solid var(--border);
            transition: var(--transition);
            text-align: center;
        }

        .status-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-hover);
            border-color: transparent;
        }

        .status-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .status-icon.healthy { color: var(--success); }
        .status-icon.warning { color: var(--warning); }
        .status-icon.danger { color: var(--danger); }

        .status-name {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: var(--text);
        }

        .status-value {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: var(--primary);
        }

        .status-label {
            font-size: 0.875rem;
            color: var(--text-light);
        }

        .status-timestamp {
            font-size: 0.75rem;
            color: var(--text-lighter);
            margin-top: 1rem;
            font-style: italic;
        }

        /* 健康详情 */
        .health-details {
            background: var(--bg-light);
            border-radius: var(--radius);
            padding: 2rem;
            border: 1px solid var(--border);
            margin-bottom: 3rem;
        }

        .details-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: var(--text);
        }

        .details-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        .detail-item {
            padding: 1rem;
            background: var(--bg);
            border-radius: var(--radius);
            border: 1px solid var(--border);
        }

        .detail-label {
            font-size: 0.85rem;
            color: var(--text-light);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            font-weight: 500;
        }

        .detail-value {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text);
        }

        /* 操作区 */
        .health-actions {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 3rem;
        }

        /* 页脚清理：隐藏页面内重复的页脚，使用全局样式管理 */
        .minimal-footer {
            display: none;
        }

        @media (max-width: 768px) {
            .health-title { font-size: 2rem; }
            .health-actions { flex-direction: column; align-items: center; }
            .btn-primary-large, .btn-secondary-large { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    <!-- 简约导航 -->
    <div th:replace="~{common/navbar :: top-nav}"></div>
    <!-- 主内容 -->
    <div class="health-container">
        <header class="health-header">
            <h1 class="health-title">系统健康检查</h1>
            <p class="health-subtitle">
                实时监控系统运行状态，确保服务稳定可靠。所有健康指标每10秒自动更新。
            </p>
        </header>

        <!-- 状态卡片 -->
        <div class="status-grid">
            <div class="status-card">
                <div class="status-icon healthy" id="statusIcon">
                    <i class="fas fa-check-circle"></i>
                </div>
                <h3 class="status-name" id="statusName">运行正常</h3>
                <div class="status-value" id="statusValue">UP</div>
                <div class="status-label">服务状态</div>
                <div class="status-timestamp" id="statusTimestamp">最后更新: 加载中...</div>
            </div>

            <div class="status-card">
                <div class="status-icon healthy">
                    <i class="fas fa-heartbeat"></i>
                </div>
                <h3 class="status-name">服务名称</h3>
                <div class="status-value" id="serviceName">AI Todo + 拖延症治疗器</div>
                <div class="status-label">应用标识</div>
            </div>

            <div class="status-card">
                <div class="status-icon healthy">
                    <i class="fas fa-code-branch"></i>
                </div>
                <h3 class="status-name">版本</h3>
                <div class="status-value" id="serviceVersion">1.0.0</div>
                <div class="status-label">当前版本</div>
            </div>
        </div>

        <!-- 健康详情 -->
        <div class="health-details">
            <h2 class="details-title">健康详情</h2>
            <div class="details-grid">
                <div class="detail-item">
                    <div class="detail-label">API 端点</div>
                    <div class="detail-value">/api/health</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">Ping 测试</div>
                    <div class="detail-value" id="pingStatus">检查中...</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">响应时间</div>
                    <div class="detail-value" id="responseTime">-</div>
                </div>
                <div class="detail-item">
                    <div class="detail-label">检查次数</div>
                    <div class="detail-value" id="checkCount">0</div>
                </div>
            </div>
        </div>

        <!-- 操作区 -->
        <div class="health-actions">
            <button class="btn-primary-large" onclick="refreshHealth()">
                <i class="fas fa-sync-alt"></i>
                立即刷新
            </button>
            <a href="/" class="btn-secondary-large">
                <i class="fas fa-home"></i>
                返回首页
            </a>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="minimal-footer">
        <div class="footer-content">
            <div class="footer-logo">
                <i class="fas fa-robot"></i>
                <span th:text="${appName}">AI Todo + 拖延症治疗器</span>
            </div>
            <div class="footer-info">
                <p>版本 <span th:text="${version}">1.0.0</span></p>
                <p>健康检查页面 - 简约设计</p>
            </div>
            <div class="footer-copyright">
                <p>© 2026 <span th:text="${appName}">AI Todo + 拖延症治疗器</span> - 保留所有权利</p>
            </div>
        </div>
    </footer>

    <!-- JavaScript -->
    <script>
        // 初始化变量
        let checkCount = 0;
        let lastUpdateTime = null;

        // DOM 元素
        const statusIcon = document.getElementById('statusIcon');
        const statusName = document.getElementById('statusName');
        const statusValue = document.getElementById('statusValue');
        const statusTimestamp = document.getElementById('statusTimestamp');
        const serviceName = document.getElementById('serviceName');
        const serviceVersion = document.getElementById('serviceVersion');
        const pingStatus = document.getElementById('pingStatus');
        const responseTime = document.getElementById('responseTime');
        const checkCountElement = document.getElementById('checkCount');

        // 更新状态显示
        function updateHealthStatus(healthData, responseTimeMs) {
            // 更新状态卡片
            const status = healthData.status || 'UP';
            const service = healthData.service || 'AI Todo + 拖延症治疗器';
            const version = healthData.version || '1.0.0';
            const timestamp = healthData.timestamp || Date.now();

            // 状态图标和颜色
            if (status === 'UP') {
                statusIcon.innerHTML = '<i class="fas fa-check-circle"></i>';
                statusIcon.className = 'status-icon healthy';
                statusName.textContent = '运行正常';
                statusName.style.color = '';
            } else if (status === 'DOWN') {
                statusIcon.innerHTML = '<i class="fas fa-times-circle"></i>';
                statusIcon.className = 'status-icon danger';
                statusName.textContent = '服务异常';
                statusName.style.color = 'var(--danger)';
            } else {
                statusIcon.innerHTML = '<i class="fas fa-exclamation-triangle"></i>';
                statusIcon.className = 'status-icon warning';
                statusName.textContent = '状态未知';
                statusName.style.color = 'var(--warning)';
            }

            statusValue.textContent = status;
            serviceName.textContent = service;
            serviceVersion.textContent = version;

            // 更新时间戳
            const date = new Date(timestamp);
            const timeStr = date.toLocaleTimeString('zh-CN', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            statusTimestamp.textContent = `最后更新: ${timeStr}`;
            lastUpdateTime = date;

            // 更新详情
            pingStatus.textContent = '正常';
            pingStatus.style.color = 'var(--success)';

            if (responseTimeMs !== undefined) {
                responseTime.textContent = `${responseTimeMs}ms`;
                responseTime.style.color = responseTimeMs < 100 ? 'var(--success)' :
                                          responseTimeMs < 500 ? 'var(--warning)' : 'var(--danger)';
            }

            checkCount++;
            checkCountElement.textContent = checkCount;
        }

        // 获取健康数据
        async function fetchHealthData() {
            const startTime = Date.now();
            try {
                const response = await fetch('/api/health');
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const data = await response.json();
                const endTime = Date.now();
                const responseTimeMs = endTime - startTime;

                updateHealthStatus(data, responseTimeMs);
                return true;
            } catch (error) {
                console.error('健康检查失败:', error);

                // 显示错误状态
                statusIcon.innerHTML = '<i class="fas fa-times-circle"></i>';
                statusIcon.className = 'status-icon danger';
                statusName.textContent = '连接失败';
                statusName.style.color = 'var(--danger)';
                statusValue.textContent = 'ERROR';

                const date = new Date();
                statusTimestamp.textContent = `最后尝试: ${date.toLocaleTimeString('zh-CN', {
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                })}`;

                pingStatus.textContent = '失败';
                pingStatus.style.color = 'var(--danger)';

                const endTime = Date.now();
                responseTime.textContent = `${endTime - startTime}ms`;
                responseTime.style.color = 'var(--danger)';

                checkCount++;
                checkCountElement.textContent = checkCount;

                return false;
            }
        }

        // 手动刷新
        function refreshHealth() {
            const refreshBtn = document.querySelector('.btn-primary');
            const originalHtml = refreshBtn.innerHTML;

            refreshBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 刷新中...';
            refreshBtn.disabled = true;

            fetchHealthData().then(success => {
                // 短暂延迟后恢复按钮状态
                setTimeout(() => {
                    refreshBtn.innerHTML = originalHtml;
                    refreshBtn.disabled = false;
                }, 500);
            });
        }

        // 自动刷新（每10秒）
        function startAutoRefresh() {
            // 立即执行一次
            fetchHealthData();

            // 每10秒刷新一次
            setInterval(fetchHealthData, 10000);
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            startAutoRefresh();
        });
    </script>
</body>
</html>
