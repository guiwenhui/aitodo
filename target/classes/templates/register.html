<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${appName} + ' - 注册'">AI Todo - 注册</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* 简约拟物化设计系统 — 与登录页统一 */
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --accent: #10b981;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --text-light: #94a3b8;
            --bg-body: #f5f7fa;
            --bg-card: #ffffff;
            --bg-input: #f8fafc;
            --border-light: #e2e8f0;
            --border-lighter: #f1f5f9;
            --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.04);
            --radius-btn: 8px;
            --radius-card: 20px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-body);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* 注册容器 */
        .register-container {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
        }

        /* 注册卡片 */
        .register-card {
            background: var(--bg-card);
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-card);
            border: 1px solid var(--border-lighter);
            padding: 3rem 2.5rem;
            position: relative;
        }

        /* 标题区域 */
        .register-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 1.5rem;
        }

        .logo-icon {
            width: 52px;
            height: 52px;
            background: #ecfdf5;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-size: 1.6rem;
            box-shadow: 0 4px 10px rgba(16, 185, 129, 0.1);
        }

        .logo-text h1 {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text-main);
            line-height: 1.2;
            letter-spacing: -0.3px;
            white-space: nowrap;
        }

        .logo-text span {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .register-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        .register-subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 0;
        }

        /* 表单样式 */
        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-main);
            font-size: 0.9rem;
        }

        .form-hint {
            color: var(--text-light);
            font-size: 0.8rem;
            margin-top: 0.35rem;
            display: block;
        }

        .input-with-icon {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
            font-size: 1.1rem;
            transition: var(--transition);
        }

        .form-input {
            width: 100%;
            padding: 0.9rem 1rem 0.9rem 3.2rem;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-btn);
            font-size: 0.95rem;
            background: var(--bg-input);
            color: var(--text-main);
            transition: var(--transition);
            font-family: inherit;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--bg-card);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .form-input:focus ~ .input-icon {
            color: var(--primary);
        }

        .form-input::placeholder {
            color: var(--text-light);
            font-weight: 400;
        }

        /* 按钮 */
        .register-button {
            width: 100%;
            padding: 1rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: var(--radius-btn);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 1.5rem;
        }

        .register-button:hover {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(16, 185, 129, 0.2);
        }

        .register-button:active {
            transform: translateY(0);
        }

        /* 底部链接 */
        .register-footer {
            text-align: center;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-lighter);
        }

        .footer-text {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 0.8rem;
        }

        .footer-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
        }

        .footer-link:hover {
            color: var(--primary-hover);
            text-decoration: underline;
        }

        /* 消息样式 */
        .message {
            padding: 0.875rem 1rem;
            border-radius: var(--radius-btn);
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
            display: none;
        }

        .message.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .message.success {
            background: #ecfdf5;
            color: #059669;
            border: 1px solid #a7f3d0;
        }

        .message.error {
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }

        .message.info {
            background: #eef2ff;
            color: #4f46e5;
            border: 1px solid #c7d2fe;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .register-card {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-card">
            <!-- 标题区域 -->
            <div class="register-header">
                <div class="logo">
                    <div class="logo-icon">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="logo-text">
                        <h1 th:text="${appName}">AI Todo + 拖延症治疗器</h1>
                        <span>简约高效的任务管理工具</span>
                    </div>
                </div>
                <h2 class="register-title">创建新账号</h2>
                <p class="register-subtitle">加入我们，开始高效管理任务</p>
            </div>

            <!-- 消息区域 -->
            <div class="message" id="message">
                <i class="fas fa-info-circle"></i> <span id="messageText"></span>
            </div>

            <!-- 注册表单 -->
            <form class="register-form" id="registerForm">
                <div class="form-group">
                    <label class="form-label" for="username">
                        <i class="fas fa-user"></i> 用户名
                    </label>
                    <div class="input-with-icon">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text"
                               id="username"
                               class="form-input"
                               placeholder="请输入用户名（3-20个字符）"
                               required>
                    </div>
                    <small class="form-hint">用户名将用于登录和显示</small>
                </div>

                <div class="form-group">
                    <label class="form-label" for="email">
                        <i class="fas fa-envelope"></i> 邮箱（可选）
                    </label>
                    <div class="input-with-icon">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email"
                               id="email"
                               class="form-input"
                               placeholder="请输入邮箱地址">
                    </div>
                    <small class="form-hint">用于接收重要通知和找回密码</small>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">
                        <i class="fas fa-lock"></i> 密码
                    </label>
                    <div class="input-with-icon">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password"
                               id="password"
                               class="form-input"
                               placeholder="请输入密码（至少6位）"
                               required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirmPassword">
                        <i class="fas fa-lock"></i> 确认密码
                    </label>
                    <div class="input-with-icon">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password"
                               id="confirmPassword"
                               class="form-input"
                               placeholder="请再次输入密码"
                               required>
                    </div>
                </div>

                <button type="submit" class="register-button">
                    <i class="fas fa-user-plus button-icon"></i> 注册
                </button>
            </form>

            <!-- 底部链接 -->
            <div class="register-footer">
                <p class="footer-text">
                    已有账号？
                    <a href="/login" class="footer-link">立即登录</a>
                </p>
                <p class="footer-text">
                    <a href="/" class="footer-link">
                        <i class="fas fa-arrow-left"></i> 返回首页
                    </a>
                </p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const registerForm = document.getElementById('registerForm');
            const message = document.getElementById('message');
            const messageText = document.getElementById('messageText');

            // 表单提交处理
            registerForm.addEventListener('submit', async function(e) {
                e.preventDefault();

                const username = document.getElementById('username').value.trim();
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value.trim();
                const confirmPassword = document.getElementById('confirmPassword').value.trim();

                // 验证输入
                if (!username || username.length < 3 || username.length > 20) {
                    showMessage('用户名长度需在3-20个字符之间', 'error');
                    return;
                }

                if (password.length < 6) {
                    showMessage('密码长度至少6位', 'error');
                    return;
                }

                if (password !== confirmPassword) {
                    showMessage('两次输入的密码不一致', 'error');
                    return;
                }

                // 显示加载状态
                const submitBtn = registerForm.querySelector('button[type="submit"]');
                const originalText = submitBtn.innerHTML;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 注册中...';
                submitBtn.disabled = true;

                try {
                    // 发送注册请求
                    const userData = {
                        username: username,
                        password: password
                    };

                    // 如果有邮箱，添加到数据中
                    if (email) {
                        userData.email = email;
                    }

                    const response = await fetch('/user/register', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(userData)
                    });

                    const result = await response.json();

                    if (result.code === 200) {
                        // 注册成功
                        showMessage('注册成功！正在跳转到登录页面...', 'success');

                        // 清空表单
                        registerForm.reset();

                        // 跳转到登录页面
                        setTimeout(() => {
                            window.location.href = '/login';
                        }, 2000);
                    } else {
                        // 注册失败
                        showMessage(result.message || '注册失败，请稍后重试', 'error');
                    }
                } catch (error) {
                    showMessage('网络错误，请稍后重试', 'error');
                    console.error('注册错误:', error);
                } finally {
                    // 恢复按钮状态
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                }
            });

            // 显示消息
            function showMessage(text, type = 'info') {
                messageText.textContent = text;
                message.className = 'message show ' + type;

                // 5秒后自动隐藏
                setTimeout(() => {
                    message.classList.remove('show');
                }, 5000);
            }

            // 输入时隐藏消息
            const inputs = document.querySelectorAll('.form-input');
            inputs.forEach(input => {
                input.addEventListener('input', () => {
                    message.classList.remove('show');
                });
            });
        });
    </script>
</body>
</html>
