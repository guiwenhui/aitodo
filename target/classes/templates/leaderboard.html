<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>积分排行榜与数据大屏 - AI Todo</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" crossorigin href="/vue/assets/index-B080iM_r.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">


    <style>
        /* 🌟 核心：统一风格的页面容器 */
        .main-container {
            max-width: 1200px; /* 数据图表需要较宽的空间 */
            margin: 100px auto 40px; /* 顶部 100px 完美避开悬浮导航栏 */
            padding: 0 20px;
        }

        /* 统一风格的页面标题区 */
        .page-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .page-title {
            color: #1e293b;
            margin-bottom: 10px;
            font-size: 2em;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .page-title i {
            color: var(--primary, #4a6fa5); /* 使用全局主色调 */
        }

        .page-subtitle {
            color: #64748b;
            font-size: 1.1em;
        }

        /* 强制重置 Vue 挂载点的默认顶部间距，因为 main-container 已经留出了空间 */
        #app {
            padding-top: 0 !important;
        }
    </style>
</head>
<body style="background-color: #f5f7fa; margin: 0; font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">

<div th:replace="~{common/navbar :: top-nav}"></div>

<main class="main-container">
    <div id="app"></div>
</main>

<script type="module" crossorigin src="/vue/assets/index-C53Zzw4b.js"></script>

</body>
</html>
