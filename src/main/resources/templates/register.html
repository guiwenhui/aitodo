<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${appName != null ? appName + ' - 注册' : 'Razor - 创建账号'}">AI Todo - 注册</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #F5F0E6;
            --card-bg: #FFFFFF;
            --primary-orange: #FFB366;
            --primary-orange-hover: #FFA04D;
            --text-main: #333333;
            --text-secondary: #666666;
            --border-color: #E0E0E0;
            --radius: 12px;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        /* 背景线条插画装饰 */
        .bg-decor {
            position: absolute;
            z-index: -1;
            pointer-events: none;
        }
        .decor-1 { top: 10%; left: 5%; width: 200px; opacity: 0.6; }
        .decor-2 { bottom: 15%; left: 10%; width: 150px; opacity: 0.5; }
        .decor-3 { top: 20%; right: 5%; width: 300px; }

        /* 头部 */
        header {
            padding: 24px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .brand {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .email-link {
            font-size: 14px;
            color: var(--text-secondary);
            text-decoration: none;
            transition: var(--transition);
        }
        .email-link:hover { color: var(--primary-orange); }

        .header-right {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .login-link {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-main);
            text-decoration: none;
        }

        .btn-demo {
            padding: 10px 24px;
            background-color: var(--primary-orange);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-demo:hover {
            background-color: var(--primary-orange-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 179, 102, 0.3);
        }

        /* 主体内容 */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .register-card {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 440px;
            padding: 48px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
            text-align: center;
        }

        .register-card h2 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 24px;
        }

        /* 提示消息样式 */
        .message {
            padding: 12px 16px;
            border-radius: var(--radius);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 20px;
            display: none;
            text-align: left;
        }
        .message.show { display: block; animation: fadeIn 0.3s ease; }
        .message.success { background: #e8f5e9; color: #2e7d32; border: 1px solid #c8e6c9; }
        .message.error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
        .message.info { background: #e3f2fd; color: #1565c0; border: 1px solid #bbdefb; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 表单样式 */
        .form-group {
            margin-bottom: 18px;
            position: relative;
            text-align: left;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            font-size: 14px;
            outline: none;
            transition: var(--transition);
            font-family: inherit;
        }

        .form-group input:focus { border-color: var(--primary-orange); }

        .input-icon {
            position: absolute;
            right: 16px;
            color: #ccc;
        }

        .form-hint {
            display: block;
            font-size: 12px;
            color: #999;
            margin-top: 6px;
            margin-left: 4px;
        }

        .btn-register {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-orange);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-top: 8px;
            margin-bottom: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .btn-register:hover { background-color: var(--primary-orange-hover); }
        .btn-register:disabled { opacity: 0.7; cursor: not-allowed; }

        .footer-text {
            font-size: 14px;
            color: var(--text-secondary);
        }
        .footer-text a {
            color: var(--primary-orange);
            text-decoration: none;
            font-weight: 600;
        }

        /* 页面底部 */
        .page-footer {
            padding: 24px 5%;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-secondary);
        }
        .footer-links a {
            color: var(--text-secondary);
            text-decoration: none;
            margin-left: 24px;
            transition: var(--transition);
        }
        .footer-links a:hover { color: var(--primary-orange); }

        /* 响应式 */
        @media (max-width: 600px) {
            header { padding: 16px 20px; }
            .header-left .email-link, .header-right .login-link { display: none; }
            .register-card { padding: 32px 24px; }
            .page-footer { flex-direction: column; align-items: center; gap: 12px; text-align: center; }
            .footer-links a { margin: 0 12px; }
            .decor-3 { display: none; }
        }
    </style>
</head>
<body>

<svg class="bg-decor decor-1" viewBox="0 0 200 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M10 50 Q 50 10, 90 50 T 170 50" stroke="#000" stroke-width="2" fill="none"/>
    <circle cx="180" cy="30" r="5" fill="#000"/>
</svg>

<svg class="bg-decor decor-2" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="10" y="10" width="40" height="40" rx="4" stroke="#000" stroke-width="1"/>
    <path d="M60 70 L 90 70 M 75 55 L 75 85" stroke="#000" stroke-width="2"/>
</svg>

<svg class="bg-decor decor-3" viewBox="0 0 400 500" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="200" cy="150" r="40" fill="#E0E0E0"/>
    <rect x="140" y="200" width="120" height="200" rx="20" fill="#E0E0E0"/>
    <path d="M100 300 Q 150 250, 200 300 T 300 300" stroke="#000" stroke-width="1.5" stroke-dasharray="5 5"/>
</svg>

<header>
    <div class="header-left">
        <div class="brand" th:text="${appName ?: 'Razor.'}">Razor.</div>
        <a href="mailto:Sales@Razor.uk" class="email-link">Sales@Razor.uk</a>
    </div>
    <div class="header-right">
        <a href="/login" class="login-link">Log in</a>
        <button class="btn-demo">Demo Request</button>
    </div>
</header>

<main>
    <div class="register-card">
        <h2>Sign up</h2>
        <p class="subtitle"></p>

        <div class="message" id="message">
            <i class="fas fa-info-circle"></i> <span id="messageText"></span>
        </div>

        <form id="registerForm">
            <div class="form-group">
                <div class="input-wrapper">
                    <input type="text" id="username" placeholder="请输入用户名（3-20个字符）" required>
                    <div class="input-icon"><i class="fa-regular fa-user"></i></div>
                </div>
                <span class="form-hint">这将作为您的系统显示名称</span>
            </div>

            <div class="form-group">
                <div class="input-wrapper">
                    <input type="email" id="email" placeholder="请输入邮箱地址（可选）">
                    <div class="input-icon"><i class="fa-regular fa-envelope"></i></div>
                </div>
                <span class="form-hint">用于接收重要通知和找回密码</span>
            </div>

            <div class="form-group">
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="请输入密码（至少6位）" required>
                    <div class="input-icon"><i class="fa-solid fa-lock"></i></div>
                </div>
            </div>

            <div class="form-group">
                <div class="input-wrapper">
                    <input type="password" id="confirmPassword" placeholder="请再次确认密码" required>
                    <div class="input-icon"><i class="fa-solid fa-shield-halved"></i></div>
                </div>
            </div>

            <button type="submit" class="btn-register">立即注册</button>

            <div class="footer-text">
                已有账号？ <a href="/login">立即登录</a>
            </div>
        </form>
    </div>
</main>

<footer class="page-footer">
    <div class="copyright">版权所有 @wework 2022</div>
    <div class="footer-links">
        <a href="/">返回首页</a>
        <a href="#">隐私政策</a>
    </div>
</footer>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        const registerForm = document.getElementById('registerForm');
        const message = document.getElementById('message');
        const messageText = document.getElementById('messageText');

        registerForm.addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const confirmPassword = document.getElementById('confirmPassword').value.trim();

            // 验证输入
            if (!username || username.length < 3 || username.length > 20) {
                showMessage('用户名长度需在3-20个字符之间', 'error');
                return;
            }

            if (password.length < 6) {
                showMessage('密码长度至少为6位', 'error');
                return;
            }

            if (password !== confirmPassword) {
                showMessage('两次输入的密码不一致', 'error');
                return;
            }

            // 显示加载状态
            const submitBtn = registerForm.querySelector('button[type="submit"]');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 处理中...';
            submitBtn.disabled = true;

            try {
                const userData = { username: username, password: password };
                if (email) userData.email = email;

                const response = await fetch('/user/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(userData)
                });

                const result = await response.json();

                if (result.code === 200) {
                    showMessage('注册成功！', 'success');
                    registerForm.reset();

                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    showMessage(result.message || '注册失败，请稍后重试。', 'error');
                }
            } catch (error) {
                showMessage('网络错误，请稍后重试', 'error');
                console.error('注册错误:', error);
            } finally {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        });

        // 提示信息动态控制
        function showMessage(text, type = 'info') {
            messageText.textContent = text;
            message.className = 'message show';
            message.classList.add(type);

            // 5秒后自动隐藏
            setTimeout(() => {
                message.classList.remove('show');
            }, 5000);
        }

        // 输入时自动隐藏消息
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('input', () => {
                message.classList.remove('show');
            });
        });
    });
</script>
</body>
</html>
