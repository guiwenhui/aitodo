<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<nav th:fragment="top-nav" class="minimal-nav">

    <!-- ==================== Scoped CSS ==================== -->
    <style>
        /* ===== Profile Trigger ===== */
        .pf-profile-area {
            position: relative;
            display: flex;
            align-items: center;
        }

        .pf-trigger {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s ease;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            padding: 0;
            outline: none;
            position: relative;
            flex-shrink: 0;
        }

        .pf-trigger:hover {
            border-color: rgba(74, 111, 165, 0.3);
            box-shadow: 0 0 0 3px rgba(74, 111, 165, 0.08);
        }

        .pf-avatar-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            display: block;
        }

        .pf-avatar-placeholder {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: 0;
            user-select: none;
        }

        /* ===== Tooltip ===== */
        .pf-tooltip {
            position: absolute;
            bottom: -32px;
            left: 50%;
            transform: translateX(-50%) translateY(4px);
            background: rgba(0, 0, 0, 0.75);
            color: #fff;
            font-size: 12px;
            padding: 4px 10px;
            border-radius: 6px;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.15s ease, transform 0.15s ease;
            z-index: 1010;
        }

        .pf-trigger:hover .pf-tooltip {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ===== Dropdown ===== */
        .pf-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            width: 260px;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08), 0 1px 4px rgba(0, 0, 0, 0.04);
            opacity: 0;
            visibility: hidden;
            transform: translateY(8px) scale(0.98);
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 1050;
            overflow: hidden;
        }

        .pf-dropdown.pf-show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
        }

        .pf-dropdown-header {
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #f0f0f0;
        }

        .pf-dropdown-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
        }

        .pf-dropdown-avatar .pf-avatar-img,
        .pf-dropdown-avatar .pf-avatar-placeholder {
            width: 40px;
            height: 40px;
            font-size: 17px;
        }

        .pf-dropdown-name {
            font-size: 14px;
            font-weight: 600;
            color: #1a1a1a;
            line-height: 1.3;
        }

        .pf-dropdown-role {
            font-size: 12px;
            color: #999;
            margin-top: 2px;
        }

        .pf-dropdown-body {
            padding: 6px 0;
        }

        .pf-dropdown-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            font-size: 13px;
            color: #444;
            cursor: pointer;
            transition: background 0.15s ease;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            font-family: inherit;
        }

        .pf-dropdown-item:hover {
            background: #f5f7fa;
        }

        .pf-dropdown-item i {
            width: 18px;
            text-align: center;
            font-size: 14px;
            color: #888;
        }

        .pf-dropdown-divider {
            height: 1px;
            background: #f0f0f0;
            margin: 4px 0;
        }

        .pf-dropdown-item.pf-danger {
            color: #e74c3c;
        }

        .pf-dropdown-item.pf-danger i {
            color: #e74c3c;
        }

        .pf-dropdown-item.pf-danger:hover {
            background: #fef2f2;
        }

        /* ===== Upload Modal ===== */
        .pf-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.25s ease;
        }

        .pf-modal-overlay.pf-show {
            opacity: 1;
            visibility: visible;
        }

        .pf-modal {
            background: #fff;
            border-radius: 16px;
            width: 400px;
            max-width: 90vw;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.12);
            transform: scale(0.95) translateY(10px);
            transition: transform 0.25s cubic-bezier(0.16, 1, 0.3, 1);
            overflow: hidden;
        }

        .pf-modal-overlay.pf-show .pf-modal {
            transform: scale(1) translateY(0);
        }

        .pf-modal-header {
            padding: 20px 24px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .pf-modal-title {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a1a;
        }

        .pf-modal-close {
            width: 28px;
            height: 28px;
            border: none;
            background: #f5f5f5;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #666;
            transition: all 0.15s ease;
        }

        .pf-modal-close:hover {
            background: #eee;
            color: #333;
        }

        .pf-modal-body {
            padding: 0 24px 24px;
        }

        .pf-preview-zone {
            width: 100%;
            aspect-ratio: 1;
            max-height: 240px;
            border: 2px dashed #e0e0e0;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            overflow: hidden;
            background: #fafbfc;
            margin-bottom: 16px;
            position: relative;
        }

        .pf-preview-zone:hover {
            border-color: #667eea;
            background: #f5f7ff;
        }

        .pf-preview-zone.pf-has-image {
            border-style: solid;
            border-color: #e0e0e0;
        }

        .pf-preview-icon {
            font-size: 32px;
            color: #ccc;
            margin-bottom: 8px;
        }

        .pf-preview-text {
            font-size: 13px;
            color: #999;
        }

        .pf-preview-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .pf-preview-zone.pf-has-image .pf-preview-icon,
        .pf-preview-zone.pf-has-image .pf-preview-text {
            display: none;
        }

        .pf-preview-zone.pf-has-image .pf-preview-img {
            display: block;
        }

        .pf-modal-actions {
            display: flex;
            gap: 10px;
        }

        .pf-btn {
            flex: 1;
            padding: 10px 0;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
            border: none;
            font-family: inherit;
        }

        .pf-btn-cancel {
            background: #f5f5f5;
            color: #666;
        }

        .pf-btn-cancel:hover {
            background: #eee;
        }

        .pf-btn-save {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
        }

        .pf-btn-save:hover {
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.35);
            transform: translateY(-1px);
        }

        .pf-btn-save:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .pf-btn-save.pf-loading {
            pointer-events: none;
            position: relative;
            color: transparent;
        }

        .pf-btn-save.pf-loading::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: pf-spin 0.6s linear infinite;
            top: 50%;
            left: 50%;
            margin: -9px 0 0 -9px;
        }

        @keyframes pf-spin {
            to { transform: rotate(360deg); }
        }

        /* ===== Login link styling ===== */
        .pf-login-link {
            display: flex;
            align-items: center;
            gap: 6px;
        }
    </style>

    <div class="nav-container">
        <a href="/" class="nav-brand">
            <i class="fas fa-robot"></i>
            <h1 th:text="${appName ?: 'AI Todo'}">AI Todo</h1>
        </a>
        <ul class="nav-links">
            <li><a href="/"><i class="fas fa-home"></i> 首页</a></li>
            <li><a href="/tasks"><i class="fas fa-tasks"></i> 任务管理</a></li>
            <li><a href="/ai-warnings"><i class="fas fa-bell"></i> Flow心流 </a></li>
            <li><a href="/leaderboard"><i class="fas fa-trophy"></i> 积分排行榜</a></li>
            <li><a href="/health"><i class="fas fa-heartbeat"></i> 健康检查</a></li>

            <!-- ===== 已登录：头像触发器 ===== -->
            <li th:if="${loggedIn}">
                <div class="pf-profile-area">
                    <button class="pf-trigger" id="pfTrigger" type="button" aria-label="用户菜单">
                        <!-- 有头像 -->
                        <img th:if="${avatarUrl != null}" th:src="${avatarUrl}"
                             alt="头像" class="pf-avatar-img" />
                        <!-- 无头像：首字母占位 -->
                        <span th:unless="${avatarUrl != null}" class="pf-avatar-placeholder"
                              th:text="${username != null ? username.substring(0,1).toUpperCase() : 'U'}">U</span>
                        <!-- Tooltip -->
                        <span class="pf-tooltip" th:text="${username}">用户名</span>
                    </button>

                    <!-- ===== 下拉菜单 ===== -->
                    <div class="pf-dropdown" id="pfDropdown">
                        <div class="pf-dropdown-header">
                            <div class="pf-dropdown-avatar">
                                <img th:if="${avatarUrl != null}" th:src="${avatarUrl}"
                                     alt="头像" class="pf-avatar-img" />
                                <span th:unless="${avatarUrl != null}" class="pf-avatar-placeholder"
                                      th:text="${username != null ? username.substring(0,1).toUpperCase() : 'U'}">U</span>
                            </div>
                            <div>
                                <div class="pf-dropdown-name" th:text="${username}">用户名</div>
                                <div class="pf-dropdown-role">个人账户</div>
                            </div>
                        </div>
                        <div class="pf-dropdown-body">
                            <button class="pf-dropdown-item" id="pfChangeAvatar" type="button">
                                <i class="fas fa-camera"></i>
                                <span>修改头像</span>
                            </button>
                            <div class="pf-dropdown-divider"></div>
                            <button class="pf-dropdown-item pf-danger" id="pfLogout" type="button">
                                <i class="fas fa-sign-out-alt"></i>
                                <span>退出登录</span>
                            </button>
                        </div>
                    </div>
                </div>
            </li>

            <!-- ===== 未登录：登录链接 ===== -->
            <li th:unless="${loggedIn}">
                <a href="/login" class="pf-login-link">
                    <i class="fas fa-sign-in-alt"></i> 登录
                </a>
            </li>
        </ul>
    </div>

    <!-- ===== 头像上传 Modal（放在 nav 内，随 fragment 一起注入） ===== -->
    <div class="pf-modal-overlay" id="pfModalOverlay" th:if="${loggedIn}">
        <div class="pf-modal">
            <div class="pf-modal-header">
                <span class="pf-modal-title">修改头像</span>
                <button class="pf-modal-close" id="pfModalClose" type="button">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="pf-modal-body">
                <div class="pf-preview-zone" id="pfPreviewZone">
                    <i class="fas fa-cloud-upload-alt pf-preview-icon"></i>
                    <span class="pf-preview-text">点击选择图片，或拖拽到此处</span>
                    <img class="pf-preview-img" id="pfPreviewImg" alt="预览" />
                </div>
                <input type="file" id="pfFileInput" accept="image/*" style="display:none" />
                <div class="pf-modal-actions">
                    <button class="pf-btn pf-btn-cancel" id="pfBtnCancel" type="button">取消</button>
                    <button class="pf-btn pf-btn-save" id="pfBtnSave" type="button" disabled>保存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== JavaScript ===== -->
    <script th:if="${loggedIn}">
    (function() {
        'use strict';

        // === DOM Elements ===
        var trigger   = document.getElementById('pfTrigger');
        var dropdown  = document.getElementById('pfDropdown');
        var changeBtn = document.getElementById('pfChangeAvatar');
        var logoutBtn = document.getElementById('pfLogout');
        var overlay   = document.getElementById('pfModalOverlay');
        var closeBtn  = document.getElementById('pfModalClose');
        var cancelBtn = document.getElementById('pfBtnCancel');
        var saveBtn   = document.getElementById('pfBtnSave');
        var fileInput = document.getElementById('pfFileInput');
        var previewZone = document.getElementById('pfPreviewZone');
        var previewImg  = document.getElementById('pfPreviewImg');

        if (!trigger || !dropdown) return;

        var selectedFile = null;

        // === 1. Toggle Dropdown ===
        trigger.addEventListener('click', function(e) {
            e.stopPropagation();
            dropdown.classList.toggle('pf-show');
        });

        // 点击外部关闭 dropdown
        document.addEventListener('click', function(e) {
            if (!dropdown.contains(e.target) && !trigger.contains(e.target)) {
                dropdown.classList.remove('pf-show');
            }
        });

        // === 2. 修改头像 ===
        changeBtn.addEventListener('click', function() {
            dropdown.classList.remove('pf-show');
            openModal();
        });

        // === 3. 退出登录 ===
        logoutBtn.addEventListener('click', function() {
            window.location.href = '/logout';
        });

        // === 4. Modal 控制 ===
        function openModal() {
            resetModal();
            overlay.classList.add('pf-show');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            overlay.classList.remove('pf-show');
            document.body.style.overflow = '';
        }

        function resetModal() {
            selectedFile = null;
            previewImg.src = '';
            previewZone.classList.remove('pf-has-image');
            saveBtn.disabled = true;
            saveBtn.classList.remove('pf-loading');
            fileInput.value = '';
        }

        closeBtn.addEventListener('click', closeModal);
        cancelBtn.addEventListener('click', closeModal);
        overlay.addEventListener('click', function(e) {
            if (e.target === overlay) closeModal();
        });

        // ESC 关闭
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
                dropdown.classList.remove('pf-show');
            }
        });

        // === 5. 选择图片 & 预览 ===
        previewZone.addEventListener('click', function() {
            fileInput.click();
        });

        // 拖拽支持
        previewZone.addEventListener('dragover', function(e) {
            e.preventDefault();
            previewZone.style.borderColor = '#667eea';
        });

        previewZone.addEventListener('dragleave', function() {
            if (!selectedFile) previewZone.style.borderColor = '';
        });

        previewZone.addEventListener('drop', function(e) {
            e.preventDefault();
            previewZone.style.borderColor = '';
            var files = e.dataTransfer.files;
            if (files.length > 0 && files[0].type.startsWith('image/')) {
                handleFile(files[0]);
            }
        });

        fileInput.addEventListener('change', function() {
            if (fileInput.files.length > 0) {
                handleFile(fileInput.files[0]);
            }
        });

        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                alert('请选择图片文件');
                return;
            }
            if (file.size > 5 * 1024 * 1024) {
                alert('图片大小不能超过 5MB');
                return;
            }
            selectedFile = file;
            var reader = new FileReader();
            reader.onload = function(e) {
                previewImg.src = e.target.result;
                previewZone.classList.add('pf-has-image');
                saveBtn.disabled = false;
            };
            reader.readAsDataURL(file);
        }

        // === 6. 上传 ===
        saveBtn.addEventListener('click', function() {
            if (!selectedFile) return;

            saveBtn.disabled = true;
            saveBtn.classList.add('pf-loading');

            var formData = new FormData();
            formData.append('file', selectedFile);

            fetch('/user/uploadAvatar', {
                method: 'POST',
                body: formData
            })
            .then(function(res) { return res.json(); })
            .then(function(result) {
                if (result.code === 200 && result.data && result.data.avatarUrl) {
                    var newUrl = result.data.avatarUrl;
                    // 无感刷新：替换页面上所有头像
                    replaceAllAvatars(newUrl);
                    closeModal();
                } else {
                    alert(result.msg || '上传失败');
                    saveBtn.disabled = false;
                    saveBtn.classList.remove('pf-loading');
                }
            })
            .catch(function(err) {
                console.error('上传头像失败:', err);
                alert('网络异常，请稍后重试');
                saveBtn.disabled = false;
                saveBtn.classList.remove('pf-loading');
            });
        });

        // === 7. 无感替换所有头像 ===
        function replaceAllAvatars(newUrl) {
            // 替换所有 .pf-avatar-img
            var imgs = document.querySelectorAll('.pf-avatar-img');
            imgs.forEach(function(img) {
                img.src = newUrl + '?t=' + Date.now();
            });

            // 隐藏所有首字母占位符，创建 img 替代
            var placeholders = document.querySelectorAll('.pf-avatar-placeholder');
            placeholders.forEach(function(ph) {
                var parent = ph.parentElement;
                var img = document.createElement('img');
                img.src = newUrl + '?t=' + Date.now();
                img.alt = '头像';
                img.className = 'pf-avatar-img';
                // 让 img 尺寸跟随父容器
                img.style.width = '100%';
                img.style.height = '100%';
                img.style.borderRadius = '50%';
                img.style.objectFit = 'cover';
                img.style.display = 'block';
                parent.insertBefore(img, ph);
                ph.style.display = 'none';
            });
        }

    })();
    </script>

</nav>

</body>
</html>
