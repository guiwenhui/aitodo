<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${appName} + ' - 登录'">AI Todo - 登录</title>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* 简约拟物化设计系统 */
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --text-light: #94a3b8;
            --bg-body: #f5f7fa;
            --bg-card: #ffffff;
            --bg-input: #f8fafc;
            --border-light: #e2e8f0;
            --border-lighter: #f1f5f9;
            --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.04);
            --radius-btn: 8px;
            --radius-card: 20px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-body);
            color: var(--text-main);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* 登录容器 */
        .login-container {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
        }

        /* 登录卡片 */
        .login-card {
            background: var(--bg-card);
            border-radius: var(--radius-card);
            box-shadow: var(--shadow-card);
            border: 1px solid var(--border-lighter);
            padding: 3rem 2.5rem;
            position: relative;
        }

        /* 标题区域 */
        .login-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 1.5rem;
        }

        .logo-icon {
            width: 52px;
            height: 52px;
            background: #eef2ff;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 1.6rem;
            box-shadow: 0 4px 10px rgba(79, 70, 229, 0.1);
        }

        .logo-text h1 {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text-main);
            line-height: 1.2;
            letter-spacing: -0.3px;
            white-space: nowrap;
        }

        .logo-text span {
            font-size: 0.9rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .login-title {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 0.5rem;
        }

        .login-subtitle {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 0;
        }

        /* 表单样式 */
        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-main);
            font-size: 0.9rem;
        }

        .input-with-icon {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
            font-size: 1.1rem;
            transition: var(--transition);
        }

        .form-input {
            width: 100%;
            padding: 0.9rem 1rem 0.9rem 3.2rem;
            border: 1px solid var(--border-light);
            border-radius: var(--radius-btn);
            font-size: 0.95rem;
            background: var(--bg-input);
            color: var(--text-main);
            transition: var(--transition);
            font-family: inherit;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--bg-card);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .form-input:focus + .input-icon {
            color: var(--primary);
        }

        .form-input::placeholder {
            color: var(--text-light);
            font-weight: 400;
        }

        /* 按钮 */
        .login-button {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-btn);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 2rem;
        }

        .login-button:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 15px rgba(79, 70, 229, 0.2);
        }

        .login-button:active {
            transform: translateY(0);
        }

        /* 底部链接 */
        .login-footer {
            text-align: center;
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-lighter);
        }

        .footer-text {
            font-size: 0.95rem;
            color: var(--text-muted);
            margin-bottom: 0.8rem;
        }

        .footer-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: var(--transition);
        }

        .footer-link:hover {
            color: var(--primary-hover);
            text-decoration: underline;
        }

        /* 错误消息 */
        .error-message {
            background: #fef2f2;
            color: #dc2626;
            padding: 0.875rem 1rem;
            border-radius: var(--radius-btn);
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
            display: none;
            border: 1px solid #fecaca;
        }

        .error-message.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <!-- 标题区域 -->
            <div class="login-header">
                <div class="logo">
                    <div class="logo-icon">
                        <i class="fas fa-robot"></i>
                    </div>
                    <div class="logo-text">
                        <h1 th:text="${appName}">AI Todo + 拖延症治疗器</h1>
                        <span>简约高效的任务管理工具</span>
                    </div>
                </div>
                <h2 class="login-title">欢迎回来</h2>
                <p class="login-subtitle">登录以管理您的任务并战胜拖延</p>
            </div>

            <!-- 错误消息 -->
            <div class="error-message" id="errorMessage">
                <i class="fas fa-exclamation-circle"></i> <span id="errorText"></span>
            </div>

            <!-- 登录表单 -->
            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="username">
                        <i class="fas fa-user"></i> 用户名
                    </label>
                    <div class="input-with-icon">
                        <i class="fas fa-user input-icon"></i>
                        <input type="text"
                               id="username"
                               class="form-input"
                               placeholder="请输入用户名"
                               required>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">
                        <i class="fas fa-lock"></i> 密码
                    </label>
                    <div class="input-with-icon">
                        <i class="fas fa-lock input-icon"></i>
                        <input type="password"
                               id="password"
                               class="form-input"
                               placeholder="请输入密码"
                               required>
                    </div>
                </div>

                <button type="submit" class="login-button">
                    <i class="fas fa-sign-in-alt button-icon"></i> 登录
                </button>
            </form>

            <!-- 底部链接 -->
            <div class="login-footer">
                <p class="footer-text">
                    还没有账号？
                    <a href="/register" class="footer-link" id="registerLink">立即注册</a>
                </p>
                <p class="footer-text">
                    <a href="/" class="footer-link">
                        <i class="fas fa-arrow-left"></i> 返回首页
                    </a>
                </p>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const loginForm = document.getElementById('loginForm');
            const errorMessage = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            const registerLink = document.getElementById('registerLink');

            // 表单提交处理
            loginForm.addEventListener('submit', async function(e) {
                e.preventDefault();

                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value.trim();

                // 验证输入
                if (!username || !password) {
                    showError('请输入用户名和密码');
                    return;
                }

                // 显示加载状态
                const submitBtn = loginForm.querySelector('button[type="submit"]');
                const originalText = submitBtn.innerHTML;
                submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 登录中...';
                submitBtn.disabled = true;

                try {
                    // 发送登录请求
                    const response = await fetch('/user/login', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ username, password })
                    });

                    const result = await response.json();

                    if (result.code === 200) {
                        // 登录成功
                        showError('登录成功！正在跳转...', 'success');

                        // 存储用户信息（简单示例）
                        localStorage.setItem('userId', result.data.userId);
                        localStorage.setItem('username', result.data.username);

                        // 跳转到Vue首页
                        setTimeout(() => {
                            window.location.href = '/';
                        }, 1000);
                    } else {
                        // 登录失败
                        showError(result.msg || '登录失败，请检查用户名和密码');
                    }
                } catch (error) {
                    showError('网络错误，请稍后重试');
                    console.error('登录错误:', error);
                } finally {
                    // 恢复按钮状态
                    submitBtn.innerHTML = originalText;
                    submitBtn.disabled = false;
                }
            });


            // 显示错误/成功消息
            function showError(message, type = 'error') {
                errorText.textContent = message;

                // 根据类型设置样式
                if (type === 'success') {
                    errorMessage.style.background = '#e8f5e9';
                    errorMessage.style.color = '#388e3c';
                    errorMessage.style.borderColor = '#c8e6c9';
                } else if (type === 'info') {
                    errorMessage.style.background = '#e3f2fd';
                    errorMessage.style.color = '#1976d2';
                    errorMessage.style.borderColor = '#bbdefb';
                } else {
                    errorMessage.style.background = '#fee';
                    errorMessage.style.color = '#d32f2f';
                    errorMessage.style.borderColor = '#ffcdd2';
                }

                errorMessage.classList.add('show');

                // 3秒后自动隐藏
                setTimeout(() => {
                    errorMessage.classList.remove('show');
                }, 5000);
            }

            // 输入时隐藏错误消息
            const inputs = document.querySelectorAll('.form-input');
            inputs.forEach(input => {
                input.addEventListener('input', () => {
                    errorMessage.classList.remove('show');
                });
            });
        });
    </script>
</body>
</html>
