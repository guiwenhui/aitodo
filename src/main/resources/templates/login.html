<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${appName != null ? appName + ' - 登录' : 'Razor - Agent Login'}">AI Todo - 登录</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #F5F0E6;
            --card-bg: #FFFFFF;
            --primary-orange: #FFB366;
            --primary-orange-hover: #FFA04D;
            --text-main: #333333;
            --text-secondary: #666666;
            --border-color: #E0E0E0;
            --radius: 12px;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        /* 🌟 核心修改：重新定位左右两侧的巨型插画 */
        .bg-decor {
            position: absolute;
            z-index: -1;
            pointer-events: none;
            bottom: 5vh; /* 统一对齐到底部 */
        }
        .decor-left {
            left: 2vw;
            width: 380px;
            max-width: 35vw;
        }
        .decor-right {
            right: 2vw;
            width: 480px;
            max-width: 45vw;
        }

        /* 头部 */
        header {
            padding: 24px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .brand {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .email-link {
            font-size: 14px;
            color: var(--text-secondary);
            text-decoration: none;
            transition: var(--transition);
        }
        .email-link:hover { color: var(--primary-orange); }

        .header-right {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .signup-link {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-main);
            text-decoration: none;
        }

        .btn-demo {
            padding: 10px 24px;
            background-color: var(--primary-orange);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-demo:hover {
            background-color: var(--primary-orange-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 179, 102, 0.3);
        }

        /* 主体内容 */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .login-card {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 440px;
            padding: 48px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
            text-align: center;
        }

        .login-card h2 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 24px;
        }

        /* 错误消息样式 */
        .error-message {
            background: #fef2f2;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: var(--radius);
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 20px;
            display: none;
            border: 1px solid #fecaca;
            text-align: left;
        }

        .error-message.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 表单样式 */
        .form-group {
            margin-bottom: 20px;
            position: relative;
            text-align: left;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            font-size: 14px;
            outline: none;
            transition: var(--transition);
            font-family: inherit;
        }

        .form-group input:focus {
            border-color: var(--primary-orange);
        }

        .input-icon {
            position: absolute;
            right: 16px;
            color: #ccc;
            cursor: pointer;
        }

        .toggle-password {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-main);
            cursor: pointer;
            user-select: none;
        }

        .trouble-link {
            display: block;
            text-align: left;
            font-size: 13px;
            color: var(--text-secondary);
            text-decoration: none;
            margin-bottom: 24px;
        }
        .trouble-link:hover { text-decoration: underline; color: var(--primary-orange); }

        .btn-signin {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-orange);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 32px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .btn-signin:hover { background-color: var(--primary-orange-hover); }
        .btn-signin:disabled { opacity: 0.7; cursor: not-allowed; }

        /* 分割线 */
        .divider {
            display: flex;
            align-items: center;
            margin-bottom: 24px;
            color: var(--text-secondary);
            font-size: 13px;
        }
        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background-color: var(--border-color);
        }
        .divider span { padding: 0 12px; color: #999; }

        /* 第三方登录 */
        .social-group {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
        }

        .btn-social {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 48px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            background: white;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-social:hover {
            background-color: #f9f9f9;
            border-color: #ccc;
        }
        .btn-social img { width: 20px; height: 20px; }

        .footer-text {
            font-size: 14px;
            color: var(--text-secondary);
        }
        .footer-text a {
            color: var(--primary-orange);
            text-decoration: none;
            font-weight: 600;
        }

        /* 页面底部 */
        .page-footer {
            padding: 24px 5%;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-secondary);
            position: relative;
            z-index: 10;
        }
        .footer-links a {
            color: var(--text-secondary);
            text-decoration: none;
            margin-left: 24px;
            transition: var(--transition);
        }
        .footer-links a:hover { color: var(--primary-orange); }

        /* 响应式 */
        @media (max-width: 1024px) {
            .bg-decor { opacity: 0.3; } /* 小屏幕透明度降低防止遮挡文字 */
        }
        @media (max-width: 600px) {
            header { padding: 16px 20px; }
            .header-left .email-link, .header-right .signup-link { display: none; }
            .login-card { padding: 32px 24px; }
            .page-footer { flex-direction: column; align-items: center; gap: 12px; text-align: center; }
            .footer-links a { margin: 0 12px; }
            .bg-decor { display: none; } /* 手机端隐藏背景插画 */
        }
    </style>
</head>
<body>

<svg class="bg-decor decor-left" viewBox="0 0 350 450" xmlns="http://www.w3.org/2000/svg">
    <circle cx="240" cy="50" r="5" fill="none" stroke="#111" stroke-width="1.5"/>
    <circle cx="310" cy="200" r="4" fill="none" stroke="#111" stroke-width="1.5"/>
    <path d="M20,120 Q60,60 120,120 T220,100" fill="none" stroke="#111" stroke-width="1.2" stroke-linecap="round"/>

    <path d="M120,160 h70 v50 h-20 l-15,15 v-15 h-35 z" fill="#F5F0E6" stroke="#111" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M60,180 h90 v60 h-60 l-15,15 v-15 h-15 z" fill="#FFF" stroke="#111" stroke-width="1.5" stroke-linejoin="round"/>
    <line x1="80" y1="205" x2="130" y2="205" stroke="#111" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="80" y1="220" x2="110" y2="220" stroke="#111" stroke-width="1.5" stroke-linecap="round"/>

    <pattern id="dotsLeft" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">

    <rect x="50" y="300" width="60" height="130" fill="#FFB366" stroke="#111" stroke-width="1.5"/>

    <rect x="130" y="350" width="70" height="80" fill="#FFF" stroke="#111" stroke-width="1.5"/>

    <line x1="0" y1="430" x2="350" y2="430" stroke="#111" stroke-width="0.5"/>
</svg>

    <path d="M280,60 Q330,100 360,80 T420,90" fill="none" stroke="#111" stroke-width="1.2" stroke-linecap="round"/>
    <circle cx="430" cy="120" r="4" fill="none" stroke="#111" stroke-width="1.5"/>
    <path d="M260,110 h40 v30 h-10 l-10,10 v-10 h-20 z" fill="#FFF" stroke="#111" stroke-width="1.5" stroke-linejoin="round"/>
    <line x1="270" y1="122" x2="290" y2="122" stroke="#111" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="270" y1="130" x2="285" y2="130" stroke="#111" stroke-width="1.5" stroke-linecap="round"/>

    <g transform="translate(0, 10)">
        <rect x="250" y="260" width="90" height="160" fill="#FFF" stroke="#111" stroke-width="1.5"/>

        <pattern id="dotsRight" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
            <circle cx="10" cy="10" r="2.5" fill="#111"/>
        </pattern>
        <rect x="370" y="280" width="60" height="140" fill="#FFB366" stroke="#111" stroke-width="1.5"/>
        <rect x="370" y="280" width="60" height="140" fill="url(#dotsRight)"/>

        <path d="M210,380 L250,290 L270,290 L230,380 Z" fill="#FFF" stroke="#111" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M195,380 L215,375 L210,390 L190,385 Z" fill="#111"/>

        <path d="M240,360 L270,280 L290,280 L260,360 Z" fill="#FFF" stroke="#111" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M225,360 L245,355 L240,370 L220,365 Z" fill="#111"/>

        <path d="M250,190 C280,190 295,220 290,290 L240,290 C230,240 240,200 250,190 Z" fill="#111" stroke="#111" stroke-width="1.5" stroke-linejoin="round"/>
        <circle cx="260" cy="210" r="1.5" fill="#FFF"/><circle cx="280" cy="220" r="1.5" fill="#FFF"/>
        <circle cx="265" cy="240" r="1.5" fill="#FFF"/><circle cx="250" cy="230" r="1.5" fill="#FFF"/>
        <circle cx="275" cy="255" r="1.5" fill="#FFF"/><circle cx="255" cy="265" r="1.5" fill="#FFF"/>
        <circle cx="285" cy="280" r="1.5" fill="#FFF"/><circle cx="245" cy="280" r="1.5" fill="#FFF"/>

        <polygon points="190,200 210,245 240,250 220,205" fill="#C5E063" stroke="#111" stroke-width="1.5" stroke-linejoin="round"/>

        <path d="M255,205 C230,225 215,225 210,220" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>
        <path d="M270,210 C245,230 230,230 225,225" fill="none" stroke="#111" stroke-width="2.5" stroke-linecap="round"/>

        <circle cx="265" cy="165" r="15" fill="#FFF" stroke="#111" stroke-width="1.5"/>
        <path d="M265,165 C260,165 255,170 255,175" fill="none" stroke="#111" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M253,155 C270,145 285,155 290,175 C300,180 300,195 285,195 C275,195 265,190 255,180 Z" fill="#111"/>
        <circle cx="285" cy="145" r="10" fill="#111"/>
    </g>

    <line x1="20" y1="430" x2="450" y2="430" stroke="#111" stroke-width="0.5"/>
</svg>

<header>
    <div class="header-left">
        <div class="brand" th:text="${appName ?: 'Razor.'}">Razor.</div>
        <a href="mailto:Sales@Razor.uk" class="email-link">Sales@Razor.uk</a>
    </div>
    <div class="header-right">
        <a href="/register" class="signup-link">Sign up</a>
        <button class="btn-demo">Demo Request</button>
    </div>
</header>

<main>
    <div class="login-card">
        <h2>Agent  Login</h2>
        <p class="subtitle"> </p>

        <div class="error-message" id="errorMessage">
            <i class="fas fa-exclamation-circle"></i> <span id="errorText"></span>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <div class="input-wrapper">
                    <input type="text" id="username" placeholder="请输入用户名或邮箱" required>
                    <div class="input-icon"><i class="fa-regular fa-circle-user"></i></div>
                </div>
            </div>

            <div class="form-group">
                <div class="input-wrapper">
                    <input type="password" id="password" placeholder="请输入密码" required>
                    <div class="input-icon toggle-password" id="passwordToggle">Hide</div>
                </div>
            </div>

            <a href="#" class="trouble-link">登录遇到问题？</a>

            <button type="submit" class="btn-signin">登录</button>

            <div class="divider">
                <span>或使用以下方式登录</span>
            </div>

            <div class="social-group">
                <button type="button" class="btn-social">
                    <img src="https://www.gstatic.com/images/branding/product/2x/googleg_48dp.png" alt="Google">
                </button>
                <button type="button" class="btn-social">
                    <i class="fa-brands fa-apple" style="font-size: 22px;"></i>
                </button>
                <button type="button" class="btn-social">
                    <i class="fa-brands fa-facebook" style="font-size: 22px; color: #1877F2;"></i>
                </button>
            </div>

            <div class="footer-text">
                还没有账号？ <a href="/register">立即注册</a>
            </div>
        </form>
    </div>
</main>

<footer class="page-footer">
    <div class="copyright">版权所有 @wework 2022</div>
    <div class="footer-links">
        <a href="/">返回首页</a>
        <a href="#">隐私政策</a>
    </div>
</footer>

<script>
    document.addEventListener('DOMContentLoaded', function() {
        // 密码显示/隐藏切换
        const passwordToggle = document.getElementById('passwordToggle');
        const passcodeInput = document.getElementById('password');

        passwordToggle.addEventListener('click', () => {
            if (passcodeInput.type === 'password') {
                passcodeInput.type = 'text';
                passwordToggle.textContent = 'Show';
            } else {
                passcodeInput.type = 'password';
                passwordToggle.textContent = 'Hide';
            }
        });

        // 原有业务逻辑的登录处理
        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');

        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) {
                showError('请输入用户名和密码');
                return;
            }

            // 按钮加载状态
            const submitBtn = loginForm.querySelector('.btn-signin');
            const originalText = submitBtn.innerHTML;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> loading...';
            submitBtn.disabled = true;

            try {
                // 请求你的 Spring Boot 后端
                const response = await fetch('/user/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ username, password })
                });

                const result = await response.json();

                if (result.code === 200) {
                    // 登录成功
                    showError('登录成功!', 'success');

                    localStorage.setItem('userId', result.data.userId);
                    localStorage.setItem('username', result.data.username);

                    setTimeout(() => {
                        window.location.href = '/';
                    }, 1000);
                } else {
                    // 登录失败
                    showError(result.msg || '用户名或密码无效');
                }
            } catch (error) {
                showError('网络错误，请稍后重试');
                console.error('Login error:', error);
            } finally {
                submitBtn.innerHTML = originalText;
                submitBtn.disabled = false;
            }
        });

        // 显示错误/成功消息
        function showError(message, type = 'error') {
            errorText.textContent = message;

            if (type === 'success') {
                errorMessage.style.background = '#e8f5e9'; // 浅绿
                errorMessage.style.color = '#2e7d32'; // 深绿
                errorMessage.style.borderColor = '#c8e6c9';
            } else if (type === 'info') {
                errorMessage.style.background = '#e3f2fd'; // 浅蓝
                errorMessage.style.color = '#1565c0'; // 深蓝
                errorMessage.style.borderColor = '#bbdefb';
            } else {
                errorMessage.style.background = '#fef2f2'; // 浅红
                errorMessage.style.color = '#dc2626'; // 深红
                errorMessage.style.borderColor = '#fecaca';
            }

            errorMessage.classList.add('show');

            setTimeout(() => {
                errorMessage.classList.remove('show');
            }, 5000);
        }

        // 输入时自动隐藏错误提示
        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('input', () => {
                errorMessage.classList.remove('show');
            });
        });
    });
</script>
</body>
</html>
