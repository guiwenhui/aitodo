<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Razor - Agent Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #F5F0E6;
            --card-bg: #FFFFFF;
            --primary-orange: #FFB366;
            --primary-orange-hover: #FFA04D;
            --text-main: #333333;
            --text-secondary: #666666;
            --border-color: #E0E0E0;
            --radius: 12px;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        /* 背景线条插画装饰 */
        .bg-decor {
            position: absolute;
            z-index: -1;
            pointer-events: none;
        }
        .decor-1 { top: 10%; left: 5%; width: 200px; opacity: 0.6; }
        .decor-2 { bottom: 15%; left: 10%; width: 150px; opacity: 0.5; }
        .decor-3 { top: 20%; right: 5%; width: 300px; }

        /* 头部 */
        header {
            padding: 24px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .brand {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .email-link {
            font-size: 14px;
            color: var(--text-secondary);
            text-decoration: none;
            transition: var(--transition);
        }
        .email-link:hover { color: var(--primary-orange); }

        .header-right {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .signup-link {
            font-size: 14px;
            font-weight: 500;
            color: var(--text-main);
            text-decoration: none;
        }

        .btn-demo {
            padding: 10px 24px;
            background-color: var(--primary-orange);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-demo:hover {
            background-color: var(--primary-orange-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 179, 102, 0.3);
        }

        /* 主体内容 */
        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .login-card {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 440px;
            padding: 48px;
            border-radius: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.04);
            text-align: center;
        }

        .login-card h2 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 32px;
        }

        /* 表单样式 */
        .form-group {
            margin-bottom: 20px;
            position: relative;
            text-align: left;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            font-size: 14px;
            outline: none;
            transition: var(--transition);
            font-family: inherit;
        }

        .form-group input:focus {
            border-color: var(--primary-orange);
        }

        .input-icon {
            position: absolute;
            right: 16px;
            color: #ccc;
            cursor: pointer;
        }

        .toggle-password {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-main);
            cursor: pointer;
            user-select: none;
        }

        .trouble-link {
            display: block;
            text-align: left;
            font-size: 13px;
            color: var(--text-secondary);
            text-decoration: none;
            margin-bottom: 24px;
        }
        .trouble-link:hover { text-decoration: underline; }

        .btn-signin {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-orange);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 32px;
        }
        .btn-signin:hover { background-color: var(--primary-orange-hover); }

        /* 分割线 */
        .divider {
            display: flex;
            align-items: center;
            margin-bottom: 24px;
            color: var(--text-lighter);
            font-size: 13px;
        }
        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background-color: var(--border-color);
        }
        .divider span { padding: 0 12px; color: #999; }

        /* 第三方登录 */
        .social-group {
            display: flex;
            gap: 12px;
            margin-bottom: 32px;
        }

        .btn-social {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 48px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            background: white;
            cursor: pointer;
            transition: var(--transition);
        }
        .btn-social:hover {
            background-color: #f9f9f9;
            border-color: #ccc;
        }
        .btn-social img { width: 20px; height: 20px; }

        .footer-text {
            font-size: 14px;
            color: var(--text-secondary);
        }
        .footer-text a {
            color: var(--primary-orange);
            text-decoration: none;
            font-weight: 600;
        }

        /* 页面底部 */
        .page-footer {
            padding: 24px 5%;
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: var(--text-secondary);
        }
        .footer-links a {
            color: var(--text-secondary);
            text-decoration: none;
            margin-left: 24px;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            header { padding: 16px 20px; }
            .header-left .email-link, .header-right .signup-link { display: none; }
            .login-card { padding: 32px 24px; }
            .page-footer { flex-direction: column; align-items: center; gap: 12px; text-align: center; }
            .footer-links a { margin: 0 12px; }
            .decor-3 { display: none; }
        }
    </style>
</head>
<body>

<svg class="bg-decor decor-1" viewBox="0 0 200 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M10 50 Q 50 10, 90 50 T 170 50" stroke="#000" stroke-width="2" fill="none"/>
    <circle cx="180" cy="30" r="5" fill="#000"/>
</svg>

<svg class="bg-decor decor-2" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="10" y="10" width="40" height="40" rx="4" stroke="#000" stroke-width="1"/>
    <path d="M60 70 L 90 70 M 75 55 L 75 85" stroke="#000" stroke-width="2"/>
</svg>

<svg class="bg-decor decor-3" viewBox="0 0 400 500" fill="none" xmlns="http://www.w3.org/2000/svg">
    <circle cx="200" cy="150" r="40" fill="#E0E0E0"/>
    <rect x="140" y="200" width="120" height="200" rx="20" fill="#E0E0E0"/>
    <path d="M100 300 Q 150 250, 200 300 T 300 300" stroke="#000" stroke-width="1.5" stroke-dasharray="5 5"/>
</svg>

<header>
    <div class="header-left">
        <div class="brand">Razor.</div>
        <a href="mailto:Sales@Razor.uk" class="email-link">Sales@Razor.uk</a>
    </div>
    <div class="header-right">
        <a href="#" class="signup-link">Sign up</a>
        <button class="btn-demo">Request Demo</button>
    </div>
</header>

<main>
    <div class="login-card">
        <h2>Agent Login</h2>
        <p class="subtitle">Hey, Enter your details to get sign in to your account</p>

        <form id="loginForm">
            <div class="form-group">
                <div class="input-wrapper">
                    <input type="text" placeholder="Enter Email / Phone No" required>
                    <div class="input-icon"><i class="fa-regular fa-circle-user"></i></div>
                </div>
            </div>

            <div class="form-group">
                <div class="input-wrapper">
                    <input type="password" id="passcodeInput" placeholder="Passcode" required>
                    <div class="input-icon toggle-password" id="passwordToggle">Hide</div>
                </div>
            </div>

            <a href="#" class="trouble-link">Having trouble in sign in?</a>

            <button type="submit" class="btn-signin">Sign in</button>

            <div class="divider">
                <span>Or Sign in with</span>
            </div>

            <div class="social-group">
                <button type="button" class="btn-social">
                    <img src="https://www.gstatic.com/images/branding/product/2x/googleg_48dp.png" alt="Google">
                </button>
                <button type="button" class="btn-social">
                    <i class="fa-brands fa-apple" style="font-size: 22px;"></i>
                </button>
                <button type="button" class="btn-social">
                    <i class="fa-brands fa-facebook" style="font-size: 22px; color: #1877F2;"></i>
                </button>
            </div>

            <div class="footer-text">
                Don't have an account? <a href="#">Request Now</a>
            </div>
        </form>
    </div>
</main>

<footer class="page-footer">
    <div class="copyright">Copyright @wework 2022</div>
    <div class="footer-links">
        <a href="#">Privacy Policy</a>
    </div>
</footer>

<script>
    // 密码显示/隐藏切换
    const passwordToggle = document.getElementById('passwordToggle');
    const passcodeInput = document.getElementById('passcodeInput');

    passwordToggle.addEventListener('click', () => {
        if (passcodeInput.type === 'password') {
            passcodeInput.type = 'text';
            passwordToggle.textContent = 'Show';
        } else {
            passcodeInput.type = 'password';
            passwordToggle.textContent = 'Hide';
        }
    });

    // 表单提交模拟
    document.getElementById('loginForm').addEventListener('submit', (e) => {
        e.preventDefault();
        alert('Sign in 按钮被点击，正在模拟登录请求...');
    });
</script>
</body>
</html>
